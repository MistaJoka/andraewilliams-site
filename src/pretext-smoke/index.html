<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pretext smoke — Andrae Williams</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script>document.documentElement.dataset.theme=localStorage.getItem('site-theme')||'graphite-command-pro';document.documentElement.dataset.sidebar=localStorage.getItem('site-sidebar')||'collapsed';</script>
    <style>
      body {
        margin: 0;
        padding: 1.5rem;
        max-width: 40rem;
      }
      h1 {
        font-family: var(--font-mono);
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin: 0 0 0.5rem;
        color: var(--primary);
      }
      p.hint {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin: 0 0 1rem;
        line-height: 1.6;
      }
      p.hint code {
        font-family: var(--font-mono);
        font-size: 0.78rem;
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
        padding: 0.1rem 0.35rem;
        border-radius: 4px;
      }
      pre {
        margin: 0;
        padding: 1rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        font-family: var(--font-mono);
        font-size: 0.78rem;
        line-height: 1.6;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h1>Pretext smoke</h1>
    <p class="hint">
      Live on this site at <code>/pretext-smoke/</code>. Local preview from repo root:
      <code>npm install</code> then <code>npm run dev:pretext</code>.
    </p>
    <pre id="out">Loading…</pre>
    <script type="module" src="/main.js"></script>
  </body>
</html>
