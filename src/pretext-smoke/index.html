<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pretext Layout Lab — Andrae Williams</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script>
      document.documentElement.dataset.theme =
        localStorage.getItem('site-theme') || 'graphite-command-pro';
    </script>
  </head>
  <body class="pretext-lab">
    <header class="lab-header">
      <div class="lab-header-top">
        <a href="../index.html" class="lab-back">← andraewilliams.com</a>
        <p class="lab-eyebrow">pretext.layout.lab</p>
        <h1 class="lab-title">Pretext Layout Lab</h1>
        <p class="lab-lede">
          Text measurement without DOM reflow — prepare once, layout on every width change.
          <a href="https://somnai-dreams.github.io/pretext-demos/" target="_blank" rel="noopener noreferrer">Advanced demos ↗</a>
        </p>
      </div>
      <div class="lab-hud" id="lab-hud" aria-live="polite">
        <span>Width: <strong>—</strong>px</span>
        <span>Lines: <strong>—</strong></span>
        <span>Height: <strong>—</strong>px</span>
        <span>Reflow: <strong>—</strong>ms</span>
        <span>DOM reads: <strong>0</strong></span>
      </div>
      <nav class="lab-nav" id="lab-nav" aria-label="Lab demos"></nav>
    </header>
    <main class="lab-main" id="demo-root">
      <p class="lab-loading">Loading demo…</p>
    </main>
    <footer class="lab-footer">
      <span>Built with <a href="https://github.com/chenglou/pretext" target="_blank" rel="noopener noreferrer">@chenglou/pretext</a></span>
      <a href="https://github.com/MistaJoka/andraewilliams-site" target="_blank" rel="noopener noreferrer">Source ↗</a>
    </footer>
    <script type="module" src="/main.js"></script>
