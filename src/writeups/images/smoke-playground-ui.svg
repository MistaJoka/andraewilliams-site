      <stop offset="0%" stop-color="#00c8e8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0.05"/>
    </linearGradient>
    <pattern id="grid2" width="32" height="32" patternUnits="userSpaceOnUse">
